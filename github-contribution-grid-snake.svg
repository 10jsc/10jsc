<svg viewBox="0 0 64 20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
@keyframes tremer {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(2px, 0); } /* Move 2 pixels para a direita */
  75% { transform: translate(-2px, 0); } /* Move 2 pixels para a esquerda */
}
      
      @keyframes comer {
        0% { transform: translate(0, 0); }
        50% { transform: translate(4px, 0); } 
        100% { transform: translate(0, 0); } 
      }
      
    .tremer {
      animation: tremer 1s linear infinite; /* Aplica a animação */
    }

      .corpo {
        fill: #4C9A2A; /* Verde */
      }

      .olho {
        fill: black;
      }

      .cobra {
        animation: comer 1s infinite;
      }
    </style>
  </defs>
  
  <rect class="corpo cobra" x="0" y="8" width="4" height="4" />
  <rect class="corpo" x="4" y="8" width="4" height="4" />
  <rect class="corpo" x="8" y="8" width="4" height="4" />
  <rect class="olho" x="1" y="9" width="1" height="2" />
  <rect class="olho" x="2" y="9" width="1" height="2" />
</svg>
