<!DOCTYPE html>
<html>
<head>
<title>Cobrinha Verde</title>
<style>
body {
  background-color: #333;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

@keyframes tremer {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(2px, 0); } /* Move 2 pixels para a direita */
  75% { transform: translate(-2px, 0); } /* Move 2 pixels para a esquerda */
}

.tremer {
  animation: tremer 1s linear infinite; /* Aplica a animação */
}
</style>
</head>
<body>
<div class="container">
  <svg width="50" height="16" viewBox="0 0 50 16" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect id="c0" class="tremer" x="0" y="0" width="10" height="10" fill="#00FF00"/>
    <rect id="c1" class="tremer" x="10" y="0" width="10" height="10" fill="#00FF00"/>
    <rect id="c2" class="tremer" x="20" y="0" width="10" height="10" fill="#00FF00"/>
    <rect id="c3" class="tremer" x="30" y="0" width="10" height="10" fill="#00FF00"/>
    <circle cx="46" cy="8" r="2" fill="black"/>
    <circle cx="42" cy="8" r="2" fill="black"/>
  </svg>
</div>
</body>
</html>
